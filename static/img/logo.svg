<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00f2fe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4facfe;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#ff0080;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7928ca;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background Glow -->
  <circle cx="256" cy="256" r="200" fill="url(#grad1)" opacity="0.1" filter="url(#glow)" />

  <!-- Circuit Tree / Brain Stem -->
  <path d="M256 480 V 300 M256 480 L 200 420 M256 480 L 312 420" stroke="url(#grad2)" stroke-width="12" stroke-linecap="round" />

  <!-- Abstract R / Cloud Shape -->
  <path d="M180 300 V 150 A 80 80 0 0 1 340 150 V 220 M180 220 H 340" stroke="url(#grad1)" stroke-width="24" stroke-linecap="round" fill="none" filter="url(#glow)" />
  <circle cx="180" cy="150" r="12" fill="#fff" />
  <circle cx="340" cy="220" r="12" fill="#fff" />
  <circle cx="256" cy="80" r="8" fill="#00f2fe" />

  <!-- Digital Nodes -->
  <circle cx="256" cy="300" r="16" fill="url(#grad2)" />
  <line x1="256" y1="300" x2="360" y2="360" stroke="url(#grad1)" stroke-width="4" />
  <circle cx="360" cy="360" r="8" fill="#fff" />

  <line x1="256" y1="300" x2="150" y2="360" stroke="url(#grad1)" stroke-width="4" />
  <circle cx="150" cy="360" r="8" fill="#fff" />

</svg>
